<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saldação do usuário</title>
</head>
<body>
    <script>
        function cumprimentarUsuario(nome){
            return "Olá, " + nome + "!";
             // função que retorna a com a informação

        }
        // VARIÀVEIS
        let nomeUsuario = prompt("Qual o seu nome?");
        // vai receber o nome e encaixar na variavel
        let saudacao = cumprimentarUsuario(nomeUsuario);
        // le a variavel e passa o parametro

        document.write(saudacao)
    </script>
</body>
</html>
