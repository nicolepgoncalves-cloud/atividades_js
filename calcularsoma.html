<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcular Soma</title>
</head>
<body>
    <button id="botaoEnviar">Somar</button>
    <!-- o nome "botaoEnviar vai dentro do document.getElementById" -->
    <script>
        function somaNumeros(){
            // pegar os valores dos números usando prompt
            let num1 = prompt("Digite o primeiro número");
            let num2 = prompt("Digite o segundo número");
            // prompt coleta informação

            // converter os valores para números e realizar a soma
            let soma = Number(num1) + Number (num2);

            document.write("A soma dos números é: " + soma);
        }
        // procura o elemento que o id:"botaoEnviar", adiciona um evento click, significa
        // que quando criar é a função que será executada.
        // chama a função criada anteriormente
        document.getElementById("botaoEnviar").addEventListener("clik", function(){
            somaNumeros();
        });
    </script>
</body>
</html>
